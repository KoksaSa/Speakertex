<head>

    <meta name="telegram:card" content="none">
    <meta property="og:image" content="">

    <!-- Основные Open Graph теги -->
    <meta property="og:title" content="speaktex" />
    <meta property="og:description" content="Boost your learning & productivity: dictate text, check spelling, improve typing speed, memorize info, and practice foreign languages with voice input!" />
    <meta property="og:image" content="https://speaktex.ru/images/preview.jpg" />
    <meta property="og:url" content="https://speaktex.ru/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="speaktex" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="speaktex" />
    <meta name="twitter:description" content="Boost your learning & productivity: dictate text, check spelling, improve typing speed, memorize info, and practice foreign languages with voice input!" />
    <meta name="twitter:image" content="https://speaktex.ru/images/preview.jpg" />
    <meta name="twitter:site" content="@yourtwitter" />

    <!-- Дополнительные -->
    <meta name="description" content="Boost your learning & productivity: dictate text, check spelling, improve typing speed, memorize info, and practice foreign languages with voice input!" />
    <title>speaktex — Dictation App</title>

    <!-- Иконки -->
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" href="./logo.png" />
</head>
<body>
    <div id="root">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;padding:20px;text-align:center;">
            <div>
                <h1>🎙️ speaktex</h1>
                <p>Loading...</p>
                <p style="color:#888;font-size:12px;">If you see this for more than 10 seconds, your device may not support this app.</p>
            </div>
        </div>
    </div>
    <script>
        // Отладка: показываем сообщение если JS не загружается
        window.onerror = function(msg, url, line) {
            var errDiv = document.createElement('div');
            errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff0000;color:#fff;padding:20px;font-size:16px;z-index:99999;';
            errDiv.textContent = 'Error: ' + msg + ' (line ' + line + ')';
            document.body.appendChild(errDiv);
            return false;
        };
    </script>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
